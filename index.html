<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音当てゲーム（C4〜C5）</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
          Arial, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        overflow-x: hidden;
      }

      h2 {
        font-size: 2.5rem;
        font-weight: 700;
        margin: 0 0 30px 0;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      button {
        padding: 12px 24px;
        margin: 8px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #424245 0%, #2a2a2d 100%);
        color: white;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        line-height: 1.4;
      }

      button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        transition: left 0.5s ease;
      }

      button:hover::before {
        left: 100%;
      }

      button:hover {
        background: linear-gradient(135deg, #4a4a4d 0%, #323235 100%);
        box-shadow:
          0 15px 40px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
        box-shadow:
          0 5px 15px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .control-section {
        margin-bottom: 40px;
        display: flex;
        align-items: center;
        gap: 15px;
        justify-content: center;
      }

      label {
        font-weight: 500;
        font-size: 15px;
        color: #a0a0a0;
        letter-spacing: 0.5px;
      }

      select {
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: linear-gradient(135deg, #2a2a2d 0%, #1a1a1d 100%);
        color: white;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow:
          0 4px 15px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      select:hover {
        background: linear-gradient(135deg, #323235 0%, #222225 100%);
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow:
          0 6px 20px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      select:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.3);
      }
      #playBtn {
        font-size: 18px;
        font-weight: 600;
        background: linear-gradient(135deg, #0071e3 0%, #0051ba 100%);
        margin-bottom: 30px;
        color: white;
        padding: 14px 32px;
        box-shadow:
          0 15px 35px rgba(0, 113, 227, 0.3),
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      #playBtn:hover {
        background: linear-gradient(135deg, #0077ed 0%, #0055c5 100%);
        box-shadow:
          0 20px 45px rgba(0, 113, 227, 0.4),
          0 10px 30px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }

      .button-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 30px;
      }

      .button-container {
        display: flex;
        gap: 40px;
        justify-content: center;
        align-items: flex-start;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }

      #referenceBtn {
        font-size: 14px;
        font-weight: 600;
        background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
        padding: 12px 20px;
        box-shadow:
          0 10px 30px rgba(124, 58, 237, 0.2),
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      #referenceBtn:hover {
        background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
        box-shadow:
          0 15px 40px rgba(124, 58, 237, 0.3),
          0 10px 30px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      #repeatBtn {
        font-size: 15px;
        font-weight: 500;
        background: linear-gradient(135deg, #30b0c0 0%, #1f7a85 100%);
        padding: 12px 24px;
        box-shadow:
          0 10px 30px rgba(48, 176, 192, 0.2),
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      #repeatBtn:hover {
        background: linear-gradient(135deg, #36bfd0 0%, #248a98 100%);
        box-shadow:
          0 15px 40px rgba(48, 176, 192, 0.3),
          0 10px 30px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      #repeatBtn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #repeatBtn:disabled:hover {
        background: linear-gradient(135deg, #30b0c0 0%, #1f7a85 100%);
        box-shadow:
          0 10px 30px rgba(48, 176, 192, 0.2),
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transform: none;
      }

      .shortcut {
        display: block;
        font-size: 12px;
        font-weight: 400;
        color: #a0a0a0;
        margin-top: 2px;
        opacity: 0.8;
      }
      #message {
        margin-top: 40px;
        font-weight: 500;
        font-size: 1.25rem;
        min-height: 2em;
        letter-spacing: 0.5px;
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #message.correct {
        color: #34c759;
        text-shadow: 0 0 20px rgba(52, 199, 89, 0.3);
      }

      #message.incorrect {
        color: #ff3b30;
        text-shadow: 0 0 20px rgba(255, 59, 48, 0.3);
      }

      #message.info {
        color: #a0a0a0;
      }
      #keyboard {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 30px;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
      }
    </style>
  </head>
  <body>
    <h2>音当てゲーム</h2>
    <div class="control-section">
      <label for="modeSelect">モード：</label>
      <select id="modeSelect">
        <option value="chromatic">半音階</option>
        <option value="diatonic">ドレミ（7音）</option>
      </select>
    </div>
    <div class="button-container">
      <div class="button-group">
        <button id="playBtn">
          音を鳴らす <span class="shortcut">(F)</span>
        </button>
        <button id="repeatBtn" disabled>
          もう一度鳴らす <span class="shortcut">(Space)</span>
        </button>
      </div>
      <button id="referenceBtn">
        下のド <span class="shortcut">(J)</span>
      </button>
    </div>
    <div id="keyboard"></div>
    <div id="message" class="info">音を鳴らしてスタートしてください</div>

    <script>
      // Web Audio APIの初期化
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // すべての周波数データ
      const allNotes = [
        { name: "C (ド)", freq: 261.63 },
        { name: "C#", freq: 277.18 },
        { name: "D (レ)", freq: 293.66 },
        { name: "D#", freq: 311.13 },
        { name: "E (ミ)", freq: 329.63 },
        { name: "F (ファ)", freq: 349.23 },
        { name: "F#", freq: 369.99 },
        { name: "G (ソ)", freq: 392.0 },
        { name: "G#", freq: 415.3 },
        { name: "A (ラ)", freq: 440.0 },
        { name: "A#", freq: 466.16 },
        { name: "B (シ)", freq: 493.88 },
        { name: "C (高いド)", freq: 523.25 },
      ];

      // ドレミファソラシドのみ
      const diatonicNotes = [
        { name: "C (ド)", freq: 261.63 },
        { name: "D (レ)", freq: 293.66 },
        { name: "E (ミ)", freq: 329.63 },
        { name: "F (ファ)", freq: 349.23 },
        { name: "G (ソ)", freq: 392.0 },
        { name: "A (ラ)", freq: 440.0 },
        { name: "B (シ)", freq: 493.88 },
        { name: "C (高いド)", freq: 523.25 },
      ];

      let currentMode = "chromatic";
      let notes = allNotes;
      let currentNote = null;

      // 音を鳴らす関数
      function playSound(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        // ピアノに近い丸みのある音にするためsine波を使用
        osc.type = "sine";
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        // 音を自然に減衰させる
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.001,
          audioCtx.currentTime + 1.5,
        );
        osc.stop(audioCtx.currentTime + 1.5);
      }

      // 「音を鳴らす」ボタンの処理
      document.getElementById("playBtn").addEventListener("click", () => {
        // ブラウザの自動再生ポリシー対応
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }

        const randomIndex = Math.floor(Math.random() * notes.length);
        currentNote = notes[randomIndex];
        playSound(currentNote.freq);

        const msgEl = document.getElementById("message");
        msgEl.textContent = "何の音でしょう？";
        msgEl.className = "info";

        // 「もう一度鳴らす」ボタンを有効にする
        document.getElementById("repeatBtn").disabled = false;
      });

      // 「もう一度鳴らす」ボタンの処理
      document.getElementById("repeatBtn").addEventListener("click", () => {
        if (currentNote) {
          playSound(currentNote.freq);
        }
      });

      // 「下のド」ボタンの処理（リファレンス音）
      document.getElementById("referenceBtn").addEventListener("click", () => {
        // ブラウザの自動再生ポリシー対応
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
        // 下のド（C4）の周波数を鳴らす
        playSound(261.63);
      });

      // キーボードを生成する関数
      function generateKeyboard() {
        const keyboardDiv = document.getElementById("keyboard");
        keyboardDiv.innerHTML = ""; // 既存のボタンをクリア

        // ショートカットキーマップ（モードと位置によって異なる）
        const shortcutMap = {
          diatonic: ["Q", "W", "E", "R", "T", "Y", "U", "I"],
          chromatic: [
            "Q",
            "W",
            "E",
            "R",
            "T",
            "Y",
            "U",
            "I",
            "O",
            "P",
            "G",
            "H",
            "B",
          ],
        };

        notes.forEach((note, index) => {
          const btn = document.createElement("button");
          const shortcutKey = shortcutMap[currentMode]?.[index];
          const shortcutDisplay = shortcutKey
            ? `<span class="shortcut">(${shortcutKey})</span>`
            : "";
          btn.innerHTML = `${note.name}${shortcutDisplay ? "<br>" + shortcutDisplay : ""}`;
          btn.addEventListener("click", () => {
            const msgEl = document.getElementById("message");
            if (!currentNote) {
              msgEl.textContent = "先に「音を鳴らす」ボタンを押してください。";
              msgEl.className = "info";
              return;
            }

            if (note.name === currentNote.name) {
              msgEl.textContent = `正解！ (${note.name}) です。`;
              msgEl.className = "correct";
              currentNote = null; // 正解したらリセット
              document.getElementById("repeatBtn").disabled = true; // 「もう一度鳴らす」を無効にする
            } else {
              msgEl.textContent = "はずれ。もう一度考えてみてください。";
              msgEl.className = "incorrect";
              // 間違えた場合は再度同じ音を鳴らしてヒントにする
              playSound(currentNote.freq);
            }
          });
          keyboardDiv.appendChild(btn);
        });
      }

      // スケールモード変更時の処理
      document.getElementById("modeSelect").addEventListener("change", (e) => {
        currentMode = e.target.value;
        notes = currentMode === "chromatic" ? allNotes : diatonicNotes;
        generateKeyboard();
        currentNote = null;
        document.getElementById("repeatBtn").disabled = true; // 「もう一度鳴らす」を無効にする
        const msgEl = document.getElementById("message");
        msgEl.textContent = "スケールを変更しました。音を鳴らしてください。";
        msgEl.className = "info";
      });

      // 初期化時にキーボードを生成
      generateKeyboard();

      // キーボードイベント処理
      function normalizeKey(key) {
        // 大文字に統一
        return key.toUpperCase();
      }

      // キーバインディングの定義
      const keyBindings = {
        // メインコマンド
        F: () => document.getElementById("playBtn").click(),
        " ": () => document.getElementById("repeatBtn").click(),
        J: () => document.getElementById("referenceBtn").click(),

        // ドレミモード（7音）
        Q: { diatonic: 0, chromatic: 0 },
        W: { diatonic: 1, chromatic: 1 },
        E: { diatonic: 2, chromatic: 2 },
        R: { diatonic: 3, chromatic: 3 },
        T: { diatonic: 4, chromatic: 4 },
        Y: { diatonic: 5, chromatic: 5 },
        U: { diatonic: 6, chromatic: 6 },
        I: { diatonic: 7, chromatic: 7 },

        // 半音階追加のキー
        O: { chromatic: 8 },
        P: { chromatic: 9 },
        G: { chromatic: 10 }, // ラ#
        H: { chromatic: 11 }, // シ
        B: { chromatic: 12 }, // 高いド
      };

      document.addEventListener("keydown", (e) => {
        const key = normalizeKey(e.key);

        // スペースキーの場合は特別処理
        if (key === " ") {
          e.preventDefault();
          const binding = keyBindings[" "];
          if (binding) binding();
          return;
        }

        const binding = keyBindings[key];
        if (!binding) return;

        // メインコマンド（関数）の場合
        if (typeof binding === "function") {
          binding();
          return;
        }

        // ノート選択コマンド（オブジェクト）の場合
        const modeKey = currentMode;
        const noteIndex = binding[modeKey];

        if (noteIndex === undefined) return;

        if (noteIndex < notes.length) {
          const note = notes[noteIndex];
          // 対応するボタンをクリック
          const keyboardDiv = document.getElementById("keyboard");
          const buttons = keyboardDiv.querySelectorAll("button");
          if (buttons[noteIndex]) {
            buttons[noteIndex].click();
          }
        }
      });
    </script>
  </body>
</html>
